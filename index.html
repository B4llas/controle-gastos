<!DOCTYPE html>
<html>
<head>
  <title>Dashboard de Gastos</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <div class="container">

    <h1>Dashboard Financeiro</h1>

    <div class="inputs">
      <input id="descricao" placeholder="Descrição">
      <input id="valor" type="number" placeholder="Valor">

      <select id="categoria">
        <option>Alimentação</option>
        <option>Transporte</option>
        <option>Lazer</option>
        <option>Outros</option>
      </select>

      <input type="date" id="data">

      <button onclick="adicionarGasto()">Adicionar</button>
    </div>

    <h2 id="total">Total: R$ 0</h2>

    <div class="filtros">
      <input type="month" id="mesInicio">
      <input type="month" id="mesFim">
      <button onclick="filtrarPeriodo()">Comparar períodos</button>
    </div>

    <ul id="lista"></ul>

    <div class="botoes">
      <button onclick="trocarGrafico('pie')">Pizza</button>
      <button onclick="trocarGrafico('bar')">Barras</button>
    </div>

    <canvas id="grafico"></canvas>

  </div>

  <!-- Módulos JS -->
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
